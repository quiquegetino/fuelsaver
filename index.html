<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FuelSave WA</title>
<meta name="description" content="Find the cheapest fuel near you in Western Australia and see if the drive to a cheaper station is actually worth it, based on your car's fuel economy." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232563eb'/%3E%3Cpath d='M50 20 C50 20 30 46 30 62 a20 20 0 0 0 40 0 C70 46 50 20 50 20 Z' fill='white'/%3E%3C/svg%3E" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { margin: 0; padding: 24px 16px; background: #f4f5f7; font-family: system-ui, -apple-system, sans-serif; }
  .ff { max-width: 680px; margin: 0 auto; color: #1a1a1a; }
  .ff-head h1 { font-size: 24px; font-weight: 600; margin: 0; }
  .ff-head p { color: #666; margin: 4px 0 20px; }
  .ff-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .ff-step { display: flex; gap: 12px; margin-bottom: 18px; }
  .ff-num { flex: none; width: 24px; height: 24px; border-radius: 50%; background: #1a5fa5; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
  .ff-step-body { flex: 1; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .ff-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }
  .ff-step-body label { display: flex; flex-direction: column; font-size: 12px; color: #666; gap: 4px; }
  .ff-input, .ff-step-body input, .ff-step-body select { height: 36px; padding: 0 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
  .ff-btn { height: 36px; padding: 0 16px; border: 1px solid #1a5fa5; background: #fff; color: #1a5fa5; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
  .ff-btn:hover { background: #f0f6fc; }
  .ff-primary { background: #1a5fa5; color: #fff; width: 100%; margin-top: 4px; }
  .ff-primary:hover { background: #14507f; }
  .ff-coords { font-size: 12px; color: #888; font-family: monospace; }
  .ff-hint { font-size: 12px; color: #999; margin: 8px 0 0; }
  .ff-status { color: #1a5fa5; font-size: 14px; margin: 12px 0 0; }
  .ff-error { color: #c0392b; font-size: 14px; margin: 12px 0 0; }
  .ff-verdict { font-size: 16px; margin: 0 0 16px; padding: 12px; border-radius: 8px; background: #f5f5f5; }
  .ff-modes { display: flex; gap: 8px; margin-bottom: 12px; }
  .ff-mode { flex: 1; height: 40px; border: 1px solid #1a5fa5; background: #fff; color: #1a5fa5; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .ff-mode-on { background: #1a5fa5; color: #fff; }
  .ff-route-row { display: flex; gap: 12px; align-items: flex-start; padding: 12px 0; border-top: 1px solid #eee; }
  .ff-route-rank { flex: 0 0 26px; height: 26px; border-radius: 50%; background: #1a5fa5; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
  .ff-route-body { flex: 1; }
  .ff-route-name { font-size: 15px; font-weight: 600; }
  .ff-route-price { color: #1a5fa5; font-weight: 600; margin-left: 6px; }
  .ff-route-meta { font-size: 13px; color: #555; margin-top: 2px; }
  .ff-route-links { margin-top: 6px; display: flex; gap: 12px; }
  .ff-route-links a { font-size: 13px; color: #1a5fa5; text-decoration: none; font-weight: 500; }
  .ff-route-links a:hover { text-decoration: underline; }
  .ff-good { background: #eafaf1; color: #1d6e4f; }
  .ff-bad { background: #fdecea; color: #a32d2d; }
  .ff-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .ff-station { border: 1px solid #e5e5e5; border-radius: 8px; padding: 12px; }
  .ff-station-tag { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #888; }
  .ff-station h3 { font-size: 15px; margin: 4px 0; }
  .ff-price { font-size: 22px; font-weight: 600; margin: 4px 0; }
  .ff-addr { font-size: 12px; color: #666; margin: 2px 0; }
  .ff-dist { font-size: 13px; color: #1a5fa5; margin: 4px 0 0; }
  .ff-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .ff-table td { padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
  .ff-table td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
  .ff-net td { font-weight: 600; }
  .ff-disclaimer { font-size: 11px; line-height: 1.5; color: #888; background: #fafafa; border: 1px solid #eee; border-radius: 8px; padding: 12px 14px; margin-top: 8px; }
  .ff-disclaimer strong { color: #666; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

// Backend URL. Automatically uses localhost during local development, and your
// deployed Render backend when running on the live site. After deploying the
// backend to Render, replace the production URL below with your real one
// (e.g. "https://fuelsaver-api.onrender.com").
const API =
  location.hostname === "localhost" || location.hostname === "127.0.0.1"
    ? "http://localhost:8000"
    : "https://fuelsaver-api.onrender.com";

// Product codes verified empirically against the live FuelWatch RSS feed
// (the numeric RSS codes do NOT match the website dropdown order).
// Confirmed by testing: 1=ULP, 2=Diesel, 4=Brand Diesel, 6=98 RON.
// 3 and 5 confirmed as valid codes returning premium/E10-range prices.
const FUEL_PRODUCTS = [
  { code: 1, label: "Unleaded (ULP)" },
  { code: 3, label: "Premium Unleaded (PULP)" },
  { code: 2, label: "Diesel" },
  { code: 4, label: "Brand Diesel" },
  { code: 5, label: "LPG / E10" },
  { code: 6, label: "98 RON" },
];

const ECONOMY_DEFAULTS = {
  1: 8.5, 2: 6.5, 3: 8.5, 4: 6.5, 5: 8.7, 6: 8.5,
};

// Maps a FuelWatch product code to the vehicle fuel category used for economy
// lookup. Both diesel products -> Diesel variants; all petrol-family products
// (ULP/PULP/98) -> Petrol (which also covers hybrids). LPG/E10 has no clean
// vehicle category here, so it falls back to no filter.
function fuelCategoryForProduct(code) {
  if (code === 2 || code === 4) return "Diesel";
  if (code === 1 || code === 3 || code === 6) return "Petrol";
  return null; // LPG/E10 (5) — don't filter
}

async function api(path, params) {
  const qs = new URLSearchParams(params).toString();
  let res;
  try {
    res = await fetch(`${API}${path}?${qs}`);
  } catch (e) {
    throw new Error(
      "Couldn't reach the backend. Is it running at " + API + "? " +
      "Start it with: uvicorn main:app --reload --port 8000"
    );
  }
  if (!res.ok) {
    const detail = await res.json().catch(() => ({}));
    throw new Error(detail.detail || `Request failed (${res.status}).`);
  }
  return res.json();
}

const fmtMoney = (n) => "$" + n.toFixed(2);
const fmtMin = (n) => Math.round(n) + " min";
// Deep links to open a station in the user's map app of choice.
const mapsUrl = (s) =>
  `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}`;
const wazeUrl = (s) =>
  `https://waze.com/ul?ll=${s.lat},${s.lng}&navigate=yes`;

function StationCard({ title, s }) {
  return (
    <div className="ff-station">
      <span className="ff-station-tag">{title}</span>
      <h3>{s.name}</h3>
      <p className="ff-price">{s.price.toFixed(1)}c</p>
      <p className="ff-addr">{s.address}, {s.suburb}</p>
      <p className="ff-dist">{s.route.distanceKm.toFixed(1)} km · {fmtMin(s.route.durationMin)}</p>
    </div>
  );
}

function FuelFinder() {
  const [origin, setOrigin] = useState(null);
  const [suburb, setSuburb] = useState("");
  const [product, setProduct] = useState(1);
  const [lPer100, setLPer100] = useState(8.5);
  const [fillLitres, setFillLitres] = useState(45);
  const [radiusKm, setRadiusKm] = useState(20);
  const [vehicle, setVehicle] = useState({ make: "", model: "", year: "" });
  const [vMakes, setVMakes] = useState([]);
  const [vModels, setVModels] = useState([]);
  const [vYears, setVYears] = useState([]);
  const [vSummary, setVSummary] = useState(null); // {min,max,avg} for chosen year
  const [economyAuto, setEconomyAuto] = useState(false); // was L/100km auto-filled?
  const [lpgWarning, setLpgWarning] = useState(false); // LPG selected: economy not reliable
  const [mode, setMode] = useState("near"); // "near" | "route"
  const [destSuburb, setDestSuburb] = useState(""); // route destination
  const [routeResult, setRouteResult] = useState(null); // along-route search result

  // Load makes once on mount.
  React.useEffect(() => {
    api("/api/vehicle/makes").then(setVMakes).catch(() => {});
  }, []);

  // When make changes, load its models and reset downstream.
  const onMakeChange = (make) => {
    setVehicle({ make, model: "", year: "" });
    setVModels([]); setVYears([]); setVSummary(null);
    if (make) api("/api/vehicle/models", { make }).then(setVModels).catch(() => {});
  };

  // When model changes, load its years and reset downstream.
  const onModelChange = (model) => {
    setVehicle((v) => ({ ...v, model, year: "" }));
    setVYears([]); setVSummary(null);
    if (model) api("/api/vehicle/years", { make: vehicle.make, model }).then(setVYears).catch(() => {});
  };

  // When year changes, fetch variants + summary and auto-fill economy.
  const onYearChange = (year) => {
    setVehicle((v) => ({ ...v, year }));
    setVSummary(null);
    if (!year) return;
    fetchVariantsAndFill(vehicle.make, vehicle.model, year, product);
  };

  // Shared helper: fetch variants filtered by the selected fuel category and
  // auto-fill the economy field with that category's average. For LPG (code 5)
  // we have no manufacturer data, so we skip auto-fill and flag a warning
  // instead — the user must enter their own figure.
  const fetchVariantsAndFill = (make, model, year, prod) => {
    if (prod === 5) {
      // LPG: don't auto-fill (data doesn't cover LPG conversions).
      setLpgWarning(true);
      setVSummary(null);
      setEconomyAuto(false);
      return;
    }
    setLpgWarning(false);
    const cat = fuelCategoryForProduct(prod);
    const params = { make, model, year };
    if (cat) params.fuel_category = cat;
    api("/api/vehicle/variants", params)
      .then((data) => {
        setVSummary(data.summary);
        if (data.summary && data.summary.avg > 0) {
          setLPer100(data.summary.avg);
          setEconomyAuto(true);
        }
      })
      .catch(() => {});
  };
  const [loading, setLoading] = useState("");
  const [error, setError] = useState("");
  const [result, setResult] = useState(null);

  const onProductChange = (code) => {
    setProduct(code);
    // If a full vehicle is already chosen, re-fetch its economy for the new
    // fuel category so the figure always matches the selected fuel. Otherwise
    // fall back to the generic per-fuel default.
    if (vehicle.make && vehicle.model && vehicle.year) {
      fetchVariantsAndFill(vehicle.make, vehicle.model, vehicle.year, code);
    } else {
      // No full vehicle selected yet — still flag LPG so the user knows the
      // economy figure needs manual entry.
      setLpgWarning(code === 5);
      if (ECONOMY_DEFAULTS[code]) setLPer100(ECONOMY_DEFAULTS[code]);
    }
  };

  const locate = useCallback(() => {
    setError(""); setLoading("Finding your location…");
    if (!navigator.geolocation) {
      setError("Geolocation isn't available in this browser."); setLoading(""); return;
    }
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        const o = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        setOrigin(o);
        try {
          setLoading("Looking up your suburb…");
          const { suburb: sub } = await api("/api/reverse", { lat: o.lat, lng: o.lng });
          setSuburb(sub); setLoading("");
        } catch (e) { setError(e.message); setLoading(""); }
      },
      () => { setError("Location permission denied or unavailable."); setLoading(""); },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }, []);

  const compare = useCallback(async () => {
    setError(""); setResult(null);
    if (!suburb) { setError("Enter a suburb, or tap \u201CUse my location\u201D."); return; }
    try {
      let from = origin;
      if (!from) {
        setLoading("Locating that suburb…");
        from = await api("/api/geocode", { suburb });
        setOrigin(from);
      }

      setLoading("Searching metro-wide prices…");
      const fuelResp = await api("/api/fuel-metro", {
        product, lat: from.lat, lng: from.lng, radius_km: radiusKm,
      });
      const stations = fuelResp.stations || [];
      if (!stations.length) {
        const fuelName = (FUEL_PRODUCTS.find((f) => f.code === product) || {}).label || "that fuel";
        setError(
          `No ${fuelName} prices found within ${radiusKm} km of you right now. ` +
          `Try a larger radius or another fuel type — FuelWatch updates daily ` +
          `(tomorrow's prices appear after 2:30pm).`
        );
        setLoading(""); return;
      }

      // Closest = smallest straight-line distance; cheapest = lowest price
      // (tie-broken by distance), both drawn from everything within the radius.
      const closestRaw = [...stations].sort((a, b) => a.distanceKm - b.distanceKm)[0];
      const cheapestRaw = [...stations].sort((a, b) =>
        a.price !== b.price ? a.price - b.price : a.distanceKm - b.distanceKm
      )[0];

      setLoading("Calculating routes…");
      // Route both with real road distances for the savings maths.
      const [closest, cheapest] = await Promise.all([closestRaw, cheapestRaw].map(async (s) => ({
        ...s,
        route: await api("/api/route", {
          from: `${from.lat},${from.lng}`, to: `${s.lat},${s.lng}`,
        }),
      })));

      const fuelLabel = (FUEL_PRODUCTS.find((f) => f.code === product) || {}).label || "fuel";
      const searchNote = fuelResp.beyondRadius
        ? `No ${fuelLabel} stations within ${radiusKm} km — showing the nearest ones beyond your radius instead.`
        : `Cheapest ${fuelLabel} within ${radiusKm} km of you, out of ${fuelResp.withinRadius} stations.`;

      const priceDiffCents = closest.price - cheapest.price;
      const fuelSaved = (priceDiffCents / 100) * fillLitres;
      const extraKm = 2 * Math.max(0, cheapest.route.distanceKm - closest.route.distanceKm);
      const extraLitres = (extraKm / 100) * lPer100;
      const extraFuelCost = (cheapest.price / 100) * extraLitres;
      const netSaving = fuelSaved - extraFuelCost;
      const extraTimeMin = 2 * Math.max(0, cheapest.route.durationMin - closest.route.durationMin);

      setResult({
        closest, cheapest, same: closest.name === cheapest.name,
        priceDiffCents, fuelSaved, extraKm, extraFuelCost, netSaving,
        extraTimeMin, count: stations.length, searchNote,
      });
      setLoading("");
    } catch (e) { setError(e.message || "Something went wrong."); setLoading(""); }
  }, [origin, suburb, product, fillLitres, lPer100, radiusKm]);

  // Find cheapest fuel along a route from origin to destination.
  const searchRoute = useCallback(async () => {
    setError(""); setRouteResult(null);
    if (!destSuburb) { setError("Enter a destination suburb or town."); return; }
    try {
      // Resolve origin: use current location if set, else geocode the suburb.
      let from = origin;
      if (!from) {
        if (!suburb) { setError("Set your starting point — tap \u201CUse my location\u201D or enter a suburb."); return; }
        setLoading("Locating your start…");
        from = await api("/api/geocode", { suburb });
        setOrigin(from);
      }
      setLoading("Locating your destination…");
      const to = await api("/api/geocode", { suburb: destSuburb });

      setLoading("Finding fuel along your route… (this can take a moment)");
      const resp = await api("/api/fuel-route", {
        product,
        from: `${from.lat},${from.lng}`,
        to: `${to.lat},${to.lng}`,
        fill_litres: fillLitres,
        l_per_100km: lPer100,
        max_detour_km: 5,
      });
      if (!resp.stations || !resp.stations.length) {
        setError(`No fuel stations found within 5 km of your route right now.`);
        setLoading(""); return;
      }
      setRouteResult({ ...resp, from, to });
      setLoading("");
    } catch (e) { setError(e.message || "Something went wrong."); setLoading(""); }
  }, [origin, suburb, destSuburb, product, fillLitres, lPer100]);

  return (
    <div className="ff">
      <div className="ff-head">
        <h1>FuelSave WA</h1>
        <p>Is the cheapest pump actually worth the drive?</p>
      </div>

      <div className="ff-modes">
        <button className={"ff-mode" + (mode === "near" ? " ff-mode-on" : "")}
          onClick={() => setMode("near")}>Near me</button>
        <button className={"ff-mode" + (mode === "route" ? " ff-mode-on" : "")}
          onClick={() => setMode("route")}>Fuel on my route</button>
      </div>

      <div className="ff-card">
        <div className="ff-step">
          <span className="ff-num">1</span>
          <div className="ff-step-body">
            <button className="ff-btn" onClick={locate}>Use my location</button>
            <input className="ff-input"
              placeholder={mode === "route" ? "Start suburb (or use my location)" : "Suburb (e.g. Bayswater)"}
              value={suburb} onChange={(e) => setSuburb(e.target.value)} />
            {origin && <span className="ff-coords">{origin.lat.toFixed(4)}, {origin.lng.toFixed(4)}</span>}
            {mode === "route" && (
              <input className="ff-input" placeholder="Destination (e.g. Geraldton)"
                value={destSuburb} onChange={(e) => setDestSuburb(e.target.value)} />
            )}
          </div>
        </div>

        <div className="ff-step">
          <span className="ff-num">2</span>
          <div className="ff-step-body ff-grid">
            <label>Fuel type
              <select value={product} onChange={(e) => onProductChange(Number(e.target.value))}>
                {FUEL_PRODUCTS.map((f) => <option key={f.code} value={f.code}>{f.label}</option>)}
              </select>
            </label>
            <label>Litres this fill
              <input type="number" value={fillLitres} min={1}
                onChange={(e) => setFillLitres(Number(e.target.value))} />
            </label>
            <label>Economy (L/100km){economyAuto ? " · auto" : ""}
              <input type="number" step="0.1" value={lPer100}
                onChange={(e) => { setLPer100(Number(e.target.value)); setEconomyAuto(false); }} />
            </label>
            <label style={{display: mode === "route" ? "none" : "block"}}>Search radius (km)
              <input type="number" step="5" min={1} max={200} value={radiusKm}
                onChange={(e) => setRadiusKm(Math.min(200, Number(e.target.value)))} />
            </label>
          </div>
        </div>

        <div className="ff-step">
          <span className="ff-num">3</span>
          <div className="ff-step-body ff-grid">
            <label>Make
              <select value={vehicle.make} onChange={(e) => onMakeChange(e.target.value)}>
                <option value="">Select make…</option>
                {vMakes.map((m) => <option key={m} value={m}>{m}</option>)}
              </select>
            </label>
            <label>Model
              <select value={vehicle.model} disabled={!vehicle.make}
                onChange={(e) => onModelChange(e.target.value)}>
                <option value="">{vehicle.make ? "Select model…" : "Pick make first"}</option>
                {vModels.map((m) => <option key={m} value={m}>{m}</option>)}
              </select>
            </label>
            <label>Year
              <select value={vehicle.year} disabled={!vehicle.model}
                onChange={(e) => onYearChange(e.target.value)}>
                <option value="">{vehicle.model ? "Select year…" : "Pick model first"}</option>
                {vYears.map((y) => <option key={y} value={y}>{y}</option>)}
              </select>
            </label>
          </div>
          {lpgWarning && (
            <p className="ff-hint" style={{color:"#b26a00"}}>
              <strong>Note:</strong> Manufacturer fuel-consumption data doesn't cover
              LPG systems, so we can't auto-fill an economy figure for LPG. LPG
              vehicles typically use more fuel by volume than petrol (often 20–30%
              more). Please enter your own L/100km below for an accurate estimate.
            </p>
          )}
          {vSummary && (
            <p className="ff-hint">
              Manufacturer combined consumption for this model-year
              {vSummary.basedOn && vSummary.basedOn !== "all fuel types"
                ? ` (${vSummary.basedOn} variants)` : ""}
              {" "}ranges <strong>{vSummary.min}–{vSummary.max} L/100km</strong>
              {vSummary.variantCount > 1 ? ` across ${vSummary.variantCount} variants` : ""}
              {" "}(avg {vSummary.avg}). We've set the figure below to the average —
              adjust it to your exact variant if you know it.
            </p>
          )}
          {!vMakes.length && (
            <p className="ff-hint">Vehicle list unavailable — you can still enter L/100km manually below.</p>
          )}
        </div>

        {mode === "near" ? (
          <button className="ff-btn ff-primary" onClick={compare}>Compare cheapest vs closest</button>
        ) : (
          <button className="ff-btn ff-primary" onClick={searchRoute}>Find cheapest fuel on my route</button>
        )}
        {loading && <p className="ff-status">{loading}</p>}
        {error && <p className="ff-error">{error}</p>}
      </div>

      {mode === "near" && result && (
        <div className="ff-card">
          {result.same ? (
            <p className="ff-verdict">Your closest station is also the cheapest — just go there.</p>
          ) : result.netSaving > 0 ? (
            <p className="ff-verdict ff-good">Driving to {result.cheapest.name} saves <strong>{fmtMoney(result.netSaving)}</strong> net, costing <strong>{fmtMin(result.extraTimeMin)}</strong> extra.</p>
          ) : (
            <p className="ff-verdict ff-bad">Not worth it — the detour costs more in fuel than you'd save. Stick with {result.closest.name}.</p>
          )}
          <div className="ff-compare">
            <StationCard title="Closest" s={result.closest} />
            <StationCard title="Cheapest" s={result.cheapest} />
          </div>
          <table className="ff-table"><tbody>
            <tr><td>Price difference</td><td>{result.priceDiffCents.toFixed(1)} c/L</td></tr>
            <tr><td>Saved on {fillLitres} L fill</td><td>{fmtMoney(result.fuelSaved)}</td></tr>
            <tr><td>Extra distance (round trip)</td><td>{result.extraKm.toFixed(1)} km</td></tr>
            <tr><td>Extra fuel burned</td><td>{fmtMoney(result.extraFuelCost)}</td></tr>
            <tr className="ff-net"><td>Net saving</td><td>{fmtMoney(result.netSaving)}</td></tr>
            <tr><td>Extra time (round trip)</td><td>{fmtMin(result.extraTimeMin)}</td></tr>
          </tbody></table>
          {result.searchNote && <p className="ff-hint" style={{color:"#b26a00"}}>{result.searchNote}</p>}
          <p className="ff-hint">Compared {result.count} stations near {suburb}. Routes via OSRM.</p>
        </div>
      )}

      {mode === "route" && routeResult && (
        <div className="ff-card">
          <p className="ff-verdict ff-good">
            Cheapest fuel on your {routeResult.routeKm} km trip:
            {" "}<strong>{routeResult.stations[0].name}</strong> in {routeResult.stations[0].suburb}
            {" "}at <strong>{routeResult.stations[0].price.toFixed(1)} c/L</strong>
            {routeResult.stations[0].offRouteKm <= 0.6
              ? " — right on your route."
              : ` — about ${routeResult.stations[0].offRouteKm} km off your route.`}
          </p>
          <p className="ff-hint">
            Ranked by real cost: pump price for a {fillLitres} L fill plus the fuel
            burned detouring off your route. Showing the best {routeResult.stations.length}
            {" "}of {routeResult.totalFound} within 5 km of your way.
          </p>
          {routeResult.stations.map((s, i) => (
            <div className="ff-route-row" key={i}>
              <div className="ff-route-rank">{i + 1}</div>
              <div className="ff-route-body">
                <div className="ff-route-name">{s.name} <span className="ff-route-price">{s.price.toFixed(1)} c/L</span></div>
                <div className="ff-route-meta">
                  {s.suburb} · {s.offRouteKm <= 0.6 ? "on route" : `${s.offRouteKm} km off route`}
                  {" · "}fill {fmtMoney(s.fillCost)}
                  {s.detourCost > 0.01 ? ` + detour ${fmtMoney(s.detourCost)}` : ""}
                  {" = "}<strong>{fmtMoney(s.realCost)}</strong>
                </div>
                <div className="ff-route-links">
                  <a href={mapsUrl(s)} target="_blank" rel="noopener noreferrer">Google Maps</a>
                  <a href={wazeUrl(s)} target="_blank" rel="noopener noreferrer">Waze</a>
                </div>
              </div>
            </div>
          ))}
          {routeResult.estimatedRoute && (
            <p className="ff-hint" style={{color:"#b26a00"}}>
              Routing service was unavailable, so this used a straight-line estimate — results are approximate.
            </p>
          )}
          <p className="ff-hint">
            Checked {routeResult.anchorsQueried} areas across {routeResult.samplePoints} points along your route. Routes via OSRM.
          </p>
        </div>
      )}

      <div className="ff-disclaimer">
        <strong>Disclaimer:</strong> Fuel prices and station information are sourced
        from the FuelWatch WA website (fuelwatch.wa.gov.au) and are provided for
        general guidance only. Prices update daily and may not reflect the exact
        amount charged at the pump. Estimated distances and travel times are
        approximate and will vary with time of day, traffic, roadworks, and the
        route taken.
        {" "}Vehicle fuel-consumption figures are the manufacturer's combined
        laboratory values (based on Green Vehicle Guide / ADR certification data)
        and are intended only to compare vehicles. Your actual fuel consumption
        will differ depending on driving habits, load, vehicle condition and
        maintenance, terrain, weather, and traffic. All savings figures are
        estimates only.
        {" "}FuelSave WA is an independent tool and is not affiliated with,
        endorsed by, or operated by FuelWatch WA, the Green Vehicle Guide, or the
        Government of Western Australia or Australia. Always confirm prices at the
        station before purchasing.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FuelFinder />);
</script>
</body>
</html>
